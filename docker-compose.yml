services:
  mysql:
    image: mysql:8.0
    container_name: dalanshu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: dalanshu_root
      MYSQL_DATABASE: dalanshu
      MYSQL_USER: dalanshu
      MYSQL_PASSWORD: dalanshu_pass
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdalanshu_root"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dalanshu-redis
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  app:
    build: .
    image: dalanshu:latest
    container_name: dalanshu
    ports:
      - "8088:8080"          # 群晖/本地访问 http://<IP>:8088
    environment:
      # ⚠️ 上线前把 JWT_SECRET 换成一段长随机字符串
      - JWT_SECRET=please-change-me-to-a-long-random-string
      - DB_DRIVER=mysql
      - MYSQL_DSN=dalanshu:dalanshu_pass@tcp(mysql:3306)/dalanshu?charset=utf8mb4
      - REDIS_ADDR=redis:6379
      - STATIC_DIR=/app/dist
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
